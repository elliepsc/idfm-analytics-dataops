dimensions:
  dim_stop:
    grain: "1 unique stop (stop_id)"
    primary_key: "stop_id"
    columns:
      - name: stop_id
        type: STRING
        description: "Unique stop identifier"
      - name: stop_name
        type: STRING
        description: "Stop name"
      - name: latitude
        type: FLOAT64
        description: "Latitude (WGS84)"
      - name: longitude
        type: FLOAT64
        description: "Longitude (WGS84)"
      - name: town
        type: STRING
        description: "Municipality"
      - name: updated_at
        type: TIMESTAMP
        description: "Last update timestamp"

  dim_line:
    grain: "1 unique line (line_id)"
    primary_key: "line_id"
    columns:
      - name: line_id
        type: STRING
        description: "Unique line identifier"
      - name: line_name
        type: STRING
        description: "Line name"
      - name: transport_mode
        type: STRING
        description: "Transport mode (RER, Metro, Train, etc.)"
      - name: operator
        type: STRING
        description: "Transport operator (RATP, SNCF, etc.)"
      - name: updated_at
        type: TIMESTAMP
        description: "Last update timestamp"

  dim_date:
    grain: "1 calendar day"
    primary_key: "date"
    description: "Standard date dimension (dbt_date package)"

  dim_ticket_type:
    grain: "1 unique ticket category"
    primary_key: "ticket_type_id"
    columns:
      - name: ticket_type_id
        type: STRING
      - name: ticket_type_name
        type: STRING

facts:
  fct_validations_daily:
    grain: "1 stop x 1 day x 1 ticket type"
    primary_key: "CONCAT(stop_id, '-', validation_date, '-', ticket_type)"
    foreign_keys:
      - dim_stop(stop_id)
      - dim_line(line_id)
      - dim_date(validation_date)
      - dim_ticket_type(ticket_type)
    columns:
      - name: validation_date
        type: DATE
        description: "Validation date"
      - name: stop_id
        type: STRING
      - name: stop_name
        type: STRING
        description: "Station name"
      - name: line_id
        type: STRING
      - name: ticket_type
        type: STRING
      - name: validation_count
        type: INTEGER
        description: "Number of validations"
      - name: ingestion_ts
        type: TIMESTAMP
        description: "Ingestion timestamp (used for freshness monitoring)"
    partitioning:
      field: "validation_date"
      type: "DAY"
    clustering:
      - "stop_id"
      - "line_id"
      - "ticket_type"

  fct_punctuality_monthly:
    grain: "1 line x 1 month"
    primary_key: "CONCAT(line_id, '-', month_date)"
    foreign_keys:
      - dim_line(line_id)
    columns:
      - name: month_date
        type: DATE
        description: "First day of the month"
      - name: line_id
        type: STRING
      - name: punctuality_rate
        type: FLOAT64
        description: "Punctuality rate (0-100)"
      - name: trains_planned
        type: INTEGER
      - name: trains_departed
        type: INTEGER
      - name: ingestion_ts
        type: TIMESTAMP
    partitioning:
      field: "month_date"
      type: "MONTH"
    clustering:
      - "line_id"

marts:
  mart_network_scorecard_monthly:
    grain: "1 line x 1 month (demand + quality)"
    description: "Network scorecard combining demand and quality metrics"
    columns:
      - name: month_date
        type: DATE
      - name: line_id
        type: STRING
      - name: line_name
        type: STRING
      - name: transport_mode
        type: STRING
      - name: total_validations
        type: INTEGER
        description: "Total validations for the month"
      - name: avg_daily_validations
        type: FLOAT64
      - name: punctuality_rate
        type: FLOAT64
      - name: mom_validation_growth
        type: FLOAT64
        description: "Month-over-month growth (%)"
      - name: risk_score
        type: FLOAT64
        description: "Risk score (validation drop + degraded punctuality)"
      - name: ingestion_ts
        type: TIMESTAMP

  fct_data_health_daily:
    grain: "1 table x 1 date"
    description: "Data quality monitoring (freshness, volume, SLA)"
    columns:
      - name: table_name
        type: STRING
      - name: metric_date
        type: DATE
      - name: row_count
        type: INTEGER
      - name: freshness_hours
        type: FLOAT64
      - name: null_percentage
        type: FLOAT64
      - name: duplicate_count
        type: INTEGER
      - name: sla_hours
        type: INTEGER
      - name: sla_met
        type: BOOLEAN
