idfm:
  base_url: "https://data.iledefrance-mobilites.fr/api/explore/v2.1"
  datasets:
    # -------------------------------------------------------------------------
    # RAIL NETWORK TICKET VALIDATIONS
    # Dataset without year suffix = "current" dataset, updated each quarter.
    # Verified via curl on 2026-02-27: 469,376 records, fields at root level.
    # ⚠️  This dataset covers the current quarter only.
    #     For historical data > 1 quarter, chain multiple datasets:
    #     validations-reseau-ferre-nombre-validations-par-jour-{N}eme-trimestre
    # -------------------------------------------------------------------------
    validations_rail:
      id: "validations-reseau-ferre-nombre-validations-par-jour-1er-trimestre"
      fields:
        date: "jour"                      # YYYY-MM-DD
        stop_id: "code_stif_arret"        # STIF stop ID (e.g. "401")
        stop_name: "libelle_arret"        # Human-readable name (e.g. "LA HACQUINIERE")
        line_code_trns: "code_stif_trns"  # STIF transport code (e.g. "810")
        line_code_res: "code_stif_res"    # STIF network code (e.g. "802")
        ticket_type: "categorie_titre"    # Ticket category (e.g. "Amethyste")
        validation_count: "nb_vald"       # Number of validations (int)
        station_id_zdc: "ida"             # correspondance ID — joins with raw_ref_stations.id_ref_zdc
      filters:
        date_field: "jour"
    # -------------------------------------------------------------------------
    # STOP REFERENTIAL
    # Denormalized dataset: 1 stop × N lines → expected duplicates
    # Verified V1: 73,840 raw records → 8,526 unique stops
    # ⚠️  API paginated at 10,000 records max — extracted stops = 10,000/73,264
    # -------------------------------------------------------------------------
    ref_stops:
      id: "arrets-lignes"
      fields:
        line_external_id: "id"
        line_name: "route_long_name"
        line_short_name: "shortname"
        stop_id: "stop_id"
        stop_name: "stop_name"
        latitude: "stop_lat"
        longitude: "stop_lon"
        transport_mode: "mode"
        operator: "operatorname"
        town: "nom_commune"
        insee_code: "code_insee"
    # -------------------------------------------------------------------------
    # LINE REFERENTIAL
    # -------------------------------------------------------------------------
    ref_lines:
      id: "referentiel-des-lignes"
      fields:
        line_id: "id_line"
        line_name: "name_line"
        transport_mode: "transportmode"
        operator: "operatorname"
    # -------------------------------------------------------------------------
    # STOP-LINE MAPPING (join table) — V4 GTFS implementation
    # Source: IDFM GTFS feed (offre-horaires-tc-gtfs-idfm)
    # Extractor: ingestion/extract_ref_stop_lines.py
    # GTFS join: stop_times.trip_id → trips.trip_id → trips.route_id (= line_id)
    # Requires: IDFM_API_KEY env var for authenticated download
    # Output: raw_ref_stop_lines in BigQuery (WRITE_TRUNCATE — full snapshot)
    # Unblocks: mart_line_demand_vs_punctuality (was returning 0 rows)
    #
    # Previous approach (DISABLED V2): arrets-lignes ODS API had no line_id
    # field and was capped at 10,000/73,264 records.
    # -------------------------------------------------------------------------
    ref_stop_lines_gtfs:
      url: "https://data.iledefrance-mobilites.fr/api/explore/v2.1/catalog/datasets/offre-horaires-tc-gtfs-idfm/exports/files"
      files_used:
        - trips.txt      # trip_id → route_id (= line_id)
        - stop_times.txt # stop_id × trip_id → derive stop_id × line_id

    # -------------------------------------------------------------------------
    # SERVICE QUALITY INDICATORS (quarterly)
    # Source: "Indicateurs de qualité de service du parcours voyageur"
    # Grain: 1 line × 1 quarter × 1 indicator
    # Fields at root level (ODS v2). Quarter format: "2025 T1".
    # Covers RATP Métro + RER + SNCF Transilien — complements punctuality KPI.
    # ⚠️  Verified dataset ID via ODS catalog on 2026-04-15.
    # -------------------------------------------------------------------------
    service_quality:
      id: "indicateurs-qualite-service-parcours-voyageur"
      fields:
        trimestre:         "trimestre"                   # Quarter part: T1/T2/T3/T4
        annee:             "annee"                       # Year as string e.g. "2022"
        line_name:         "ligne"                       # e.g. "Ligne A"
        line_id:           "id_line"                     # IDFM line_id (e.g. "C01742")
        indicator_label:   "indicateur"                  # Full indicator name
        indicator_theme:   "thematique"                  # Theme category
        indicator_value:   "resultat_indicateurs_en"     # Float text (%)
        target_value:      "objectif_reference_contrat"  # Float text (%)
        transport_mode:    "mode"                        # e.g. "METRO", "RER"
        operator:          "operateur"                   # e.g. "RATP", "SNCF"
    # -------------------------------------------------------------------------
    # DISRUPTION / INCIDENTS (daily snapshot)
    # Primary source: PRIM Navitia "Messages Info Trafic (v2)" line_reports API.
    # Confirmed contract on 2026-04-16 from exported swagger + live JSON sample:
    #   Host:      https://prim.iledefrance-mobilites.fr
    #   Endpoint:  /marketplace/v2/navitia/line_reports/line_reports
    #   Auth:      header "apikey: <PRIM_API_KEY>"
    #   Payload:   top-level "disruptions" array + paginated "line_reports"
    #
    # Fallback: use "cartes-des-travaux" (ODS) for planned works only when
    # PRIM is unavailable.
    # -------------------------------------------------------------------------
    incidents:
      id: "cartes-des-travaux"                 # Fallback ODS: planned works only
      prim:
        api_url: "https://prim.iledefrance-mobilites.fr/marketplace/v2/navitia/line_reports/line_reports"
        records_path: "line_reports"
        api_key_location: "header"
        api_key_name: "apikey"
        start_date_param: null                 # Filtered client-side from application_periods
        end_date_param: null
        default_params:
          count: 100
      fields:
        incident_date:     "date_debut"         # Start date (YYYY-MM-DD)
        incident_end_date: "date_fin"           # End date (YYYY-MM-DD or NULL)
        line_id:           "id_ligne"           # Affected line (IDFM format)
        line_name:         "ligne"              # e.g. "RER A"
        incident_type:     "type_perturbation"  # e.g. "TRAVAUX", "INCIDENT"
        cause:             "cause"              # Human cause description
        affected_stops:    "arrets_concernes"   # Comma-sep list of stop names
        transport_mode:    "mode"               # e.g. "RER", "METRO"
      filters:
        date_field: "date_debut"
    # -------------------------------------------------------------------------
    # HOURLY VALIDATION PROFILES — ferré (quarterly snapshot)
    # Source: "Validations sur le réseau ferré : Profils horaires par jour type"
    # Grain: 1 stop × 1 hour × 1 day_type (JOHV / SAM / DIM)
    # Extractor: ingestion/extract_hourly_profiles.py
    # ⚠️  Dataset ID changes every quarter — update `id` when a new edition is published.
    # Pattern: validations-sur-le-reseau-ferre-profils-horaires-par-jour-type-{N}eme-trimestre-{YYYY}
    # Latest verified (2026-04-15): 2ème trimestre 2025.
    # Check: https://data.iledefrance-mobilites.fr/explore/?q=profils+horaires+ferr%C3%A9
    # Use: enriches mart_validations_line_daily with intra-day demand distribution.
    # -------------------------------------------------------------------------
    hourly_profiles:
      id: "validations-sur-le-reseau-ferre-profils-horaires-par-jour-type-2eme-trimestre-2025"
      quarter: "T2 2025"  # Edition label — update each quarter when dataset ID is updated
      fields:
        stop_id:           "code_stif_arret"         # STIF numeric stop code (text)
        stop_name:         "libelle_arret"            # Human-readable name
        line_code_trns:    "code_stif_trns"           # Operator code (100=RATP, 800=SNCF)
        line_code_res:     "code_stif_res"            # Network code
        hour_label:        "trnc_horr_60"             # Hour range text e.g. "05H-06H"
        day_type:          "cat_jour"                 # JOHV/SAHV/JOVS/SAVS/DIJFP
        validation_share:  "pourcentage_validations"  # % of daily validations in this hour/day_type
      filters:
        date_field: null  # Full-snapshot dataset — no date filter

transilien:
  base_url: "https://ressources.data.sncf.com/api/explore/v2.1"
  datasets:
    # -------------------------------------------------------------------------
    # TRANSILIEN MONTHLY PUNCTUALITY
    # Verified via curl on 2026-02-27: 1,983 records
    # Date format: YYYY-MM (not YYYY-MM-DD!)
    # ⚠️  taux_regularite does NOT exist → correct field is taux_de_ponctualite
    # ⚠️  nombre_de_trains_prevu / partis do NOT exist in this dataset
    # -------------------------------------------------------------------------
    punctuality:
      id: "ponctualite-mensuelle-transilien"
      fields:
        month: "date"                              # Format YYYY-MM (e.g. "2013-01")
        service: "service"                         # Network type (e.g. "RER")
        line_id: "ligne"                           # Line code (e.g. "A")
        line_name: "nom_de_la_ligne"               # Full name (e.g. "RER A")
        punctuality_rate: "taux_de_ponctualite"    # Punctuality % (e.g. 83.6)
      filters:
        date_field: "date"
