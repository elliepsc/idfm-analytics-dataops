name: Data Quality

on:
  schedule:
    - cron: '0 6 * * 1-5'
  push:
    branches: [main, develop]
    paths:
      - 'warehouse/dbt/**'
      - 'scripts/**'
      - 'tests/**'
  pull_request:
  workflow_dispatch:

jobs:
  dbt-quality:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dbt
        # Pin to same version as prod (1.8.7) to avoid dbt 1.11+ deprecation warnings
        # breaking the build. Upgrade intentionally when ready to address deprecations.
        run: pip install dbt-core==1.8.7 dbt-bigquery==1.8.2

      - name: dbt deps
        run: |
          cd warehouse/dbt
          cp profile_ci.yml /tmp/profiles.yml
          dbt deps --profiles-dir /tmp --profile transport_ci --target ci

      - name: dbt parse
        run: |
          cd warehouse/dbt
          GCP_PROJECT_ID=dummy-project dbt parse \
            --profiles-dir /tmp --profile transport_ci --target ci

      - name: Authenticate to GCP (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: dbt build monitoring models (prod)
        # FIX: use '+marts.monitoring' to include upstream dependencies (fct_validations_daily,
        # fct_punctuality_monthly, mart_network_scorecard_monthly from transport_core/analytics).
        # Without '+', dbt tries to build monitoring marts whose ref() targets don't exist
        # in the CI environment, causing 404 Dataset transport_core not found.
        #
        # EXCLUDE fct_validations_line_daily: depends on int_validation_stop_line (VIEW over
        # raw GTFS tables). If raw_ref_stop_id_mapping / raw_ref_stop_lines are not materialized
        # in the CI environment, the VIEW execution fails with 404.
        #
        # EXCLUDE mart_bridge_coverage_daily: same root cause — directly refs int_validation_stop_line.
        # This model is in marts/monitoring/ so +marts.monitoring would include it and trigger
        # the same 404. Build it separately once the GTFS raw tables are confirmed available.
        #
        # mart_network_scorecard_monthly (rewritten) now depends on mart_validations_line_daily
        # which refs fct_validations_line_daily (excluded but exists as physical table in prod) → OK.
        run: |
          cd warehouse/dbt
          GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }} \
          dbt build --target prod --select +marts.monitoring \
            --exclude fct_validations_line_daily mart_bridge_coverage_daily

  data-quality-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: pytest tests/unit/ -v --cov=ingestion --cov-report=xml

      - name: Check SLA script syntax
        run: python3 -m py_compile scripts/check_sla.py && echo "SLA script OK"

      - name: Great Expectations validate data quality
        run: |
          python3 scripts/create_test_data.py
          python3 scripts/validate_data_quality.py

      - name: Authenticate to GCP (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Check SLA compliance (prod BigQuery)
        run: |
          GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }} \
          python scripts/check_sla.py

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install bandit
        run: pip install bandit

      - name: Security scan
        run: bandit -r ingestion/ scripts/ -ll --exit-zero
