name: CI

on:
  pull_request:
  push:
    branches: [main, develop]

jobs:
  # ─────────────────────────────────────────────────────────────
  # Job 1: Python quality — lint + tests (independent)
  # ─────────────────────────────────────────────────────────────
  python-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install black flake8 isort pytest pytest-cov

      - name: Lint Python (black)
        run: black --check ingestion/ scripts/ orchestration/airflow/dags/ tests/

      - name: Lint Python (isort)
        run: isort --check-only ingestion/ scripts/ orchestration/airflow/dags/ tests/

      - name: Lint Python (flake8)
        run: flake8 ingestion/ scripts/ orchestration/airflow/dags/ tests/ --max-line-length=120 --extend-ignore=E203

      - name: Run unit tests
        run: pytest tests/unit/ -v --cov=ingestion --cov=scripts --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: unittests

  # ─────────────────────────────────────────────────────────────
  # Job 2: Terraform validate (independent)
  # ─────────────────────────────────────────────────────────────
  terraform-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.5"

      - name: Terraform fmt check
        run: |
          cd terraform
          terraform fmt -check -recursive
          echo "✅ Terraform formatting OK"

      - name: Terraform validate
        run: |
          cd terraform
          terraform init -backend=false
          terraform validate
          echo "✅ Terraform config valid"

  # ─────────────────────────────────────────────────────────────
  # Job 3: dbt parse (independent — no GCP credentials needed)
  # ─────────────────────────────────────────────────────────────
  dbt-parse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dbt
        run: pip install dbt-core dbt-bigquery

      - name: dbt deps
        run: cd warehouse/dbt && dbt deps

      - name: dbt parse
        run: |
          cd warehouse/dbt
          cp profile_ci.yml /tmp/profiles.yml
          GCP_PROJECT_ID=dummy-project dbt parse --profiles-dir /tmp --profile transport_ci --target ci
          echo "✅ dbt parse successful"

  # ─────────────────────────────────────────────────────────────
  # Summary — runs after all jobs, always
  # ─────────────────────────────────────────────────────────────
  summary:
    runs-on: ubuntu-latest
    needs: [python-quality, terraform-validate, dbt-parse]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "python-quality: ${{ needs.python-quality.result }}"
          echo "terraform-validate: ${{ needs.terraform-validate.result }}"
          echo "dbt-parse: ${{ needs.dbt-parse.result }}"
