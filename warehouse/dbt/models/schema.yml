# dbt model tests and documentation
# V3 — enriched: 88 tests
models:
  # ─────────────────────────────────────────────────────────────
  # STAGING
  # ─────────────────────────────────────────────────────────────
  - name: stg_validations_rail_daily
    description: "Rail network ticket validations - cleaned and deduplicated staging data"
    columns:
      - name: validation_date
        description: "Validation date"
        data_tests:
          - not_null
          - assert_valid_date_range:
              min_date: '2020-01-01'
      - name: validation_month
        description: "Validation month (DATE_TRUNC MONTH)"
        data_tests:
          - not_null
      - name: year
        description: "Validation year"
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 2020
              max_value: 2030
              inclusive: true
      - name: month
        description: "Month number (1-12)"
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 1
              max_value: 12
              inclusive: true
      - name: day_of_week
        description: "Day of week (1=Sunday, 7=Saturday in BigQuery)"
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 1
              max_value: 7
              inclusive: true
      - name: stop_id
        description: "Stop identifier (STIF numeric code)"
        data_tests:
          - not_null
      - name: line_code_trns
        description: "Operator code (100=RATP, 800=SNCF)"
        data_tests:
          - not_null
      - name: ticket_type
        description: "Ticket category (normalized UPPER)"
        data_tests:
          - not_null
      - name: is_subscription
        description: >
          TRUE if ticket_type is a subscription pass (Navigo, Navigo Annuel,
          Navigo Semaine, Imagine R). Computed at staging to avoid re-joining
          ticket_type_mapping in downstream marts. Pattern: Kenya Energy flags.
        data_tests:
          - not_null
      - name: is_student
        description: >
          TRUE if ticket_type is Imagine R (subsidised student pass only).
          Subset of is_subscription. All is_student=TRUE rows also have
          is_subscription=TRUE.
        data_tests:
          - not_null
      - name: validation_count
        description: "Number of validations"
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              inclusive: true
      - name: ingestion_ts
        description: "Ingestion timestamp"
        data_tests:
          - not_null

  - name: stg_punctuality_monthly
    description: "Transilien punctuality - cleaned staging data"
    columns:
      - name: month_date
        description: "First day of the month"
        data_tests:
          - not_null
          - assert_valid_date_range:
              min_date: '2020-01-01'
      - name: line_id
        description: "Line identifier"
        data_tests:
          - not_null
      - name: punctuality_rate
        description: "Punctuality rate (%)"
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 100
              inclusive: true

  # ─────────────────────────────────────────────────────────────
  # CORE - DIMENSIONS
  # ─────────────────────────────────────────────────────────────
  - name: dim_stop
    description: |
      **Stop dimension**

      **Grain**: 1 unique stop (stop_id)

      **Source**: IDFM stop referential

      **Refresh**: Daily (TRUNCATE + reload)

      **Usage**: Join with fct_validations_daily
    columns:
      - name: stop_id
        description: "Unique stop identifier (PK) — IDFM:xxxxx format"
        data_tests:
          - not_null
          - unique
      - name: stop_name
        description: "Stop name"
        data_tests:
          - not_null
      - name: latitude
        description: "WGS84 latitude (Ile-de-France: 48.0-49.5)"
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 48.0
              max_value: 49.5
      - name: longitude
        description: "WGS84 longitude (Ile-de-France: 1.5-3.5)"
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 1.5
              max_value: 3.5

  - name: dim_line
    description: |
      **Line dimension**

      **Grain**: 1 unique line (line_id)

      **Source**: IDFM line referential

      **Refresh**: Daily (TRUNCATE + reload)
    columns:
      - name: line_id
        description: "Unique line identifier (PK) — IDFM Cxxxxx format"
        data_tests:
          - not_null
          - unique
      - name: line_name
        description: "Line name"
        data_tests:
          - not_null
      - name: transport_mode
        description: "Transport mode (RER, METRO, TRAIN, etc.)"
        data_tests:
          - not_null
          - accepted_values:
              values: ['RER', 'METRO', 'RAIL', 'BUS', 'TRAM', 'CABLEWAY', 'FUNICULAR']
              severity: warn
      - name: operator
        description: "Transport operator (RATP, SNCF, etc.)"
        data_tests:
          - not_null

  - name: dim_ticket_type
    description: |
      **Ticket type dimension**

      **Grain**: 1 unique ticket category

      **Source**: Extracted from validations (DISTINCT)
    columns:
      - name: ticket_type_id
        description: "Surrogate identifier (PK)"
        data_tests:
          - not_null
          - unique
      - name: ticket_type_name
        description: "Category name"
        data_tests:
          - not_null

  # ─────────────────────────────────────────────────────────────
  # CORE - FACTS
  # ─────────────────────────────────────────────────────────────
  - name: fct_validations_daily
    description: |
      **Daily validations fact table**

      **Grain**: 1 stop x 1 day x 1 ticket type x 1 operator

      **Primary key**: validation_key (surrogate on stop_id + validation_date + ticket_type + line_code_trns)

      **Available identifiers**:
      - stop_id: STIF numeric code (no direct FK to dim_stop — different systems)
      - line_code_trns: operator code (100=RATP, 800=SNCF — no FK to dim_line)
      - ticket_type -> dim_ticket_type (join possible via ticket_type_name)

      **Partitioning**: By validation_date (DAY)

      **Clustering**: stop_id, ticket_type

      **Materialization**: Incremental (INSERT_OVERWRITE on new dates)

      **Refresh**: Daily

      **Retention**: 2 years

      **Note V3**: stop_id reconciliation (STIF -> IDFM) and line_code_trns -> line_id mapping
      are improvements tracked in the V3 backlog.
    columns:
      - name: validation_key
        description: "Unique surrogate key (PK) — hash(stop_id, validation_date, ticket_type, line_code_trns)"
        data_tests:
          - not_null
          - unique:
              severity: warn
      - name: validation_date
        description: "Validation date (partition key)"
        data_tests:
          - not_null
          - assert_valid_date_range:
              min_date: '2020-01-01'
      - name: validation_month
        description: "Validation month (DATE_TRUNC MONTH)"
        data_tests:
          - not_null
      - name: year
        description: "Validation year"
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 2020
              max_value: 2030
              inclusive: true
      - name: month
        description: "Month number (1-12)"
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 1
              max_value: 12
              inclusive: true
      - name: day_of_week
        description: "Day of week (1=Sunday, 7=Saturday in BigQuery)"
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 1
              max_value: 7
              inclusive: true
      - name: stop_id
        description: >
          Stop identifier using the STIF numeric code (e.g. '1', '10') from
          historical CSV files.
          NOTE: relationship test to dim_stop intentionally removed.
          dim_stop.stop_id uses the IDFM API format (e.g. 'IDFM:11639'), a different
          identifier system for the same physical stops. A direct join requires a
          mapping table — tracked as V3 improvement (stop_id reconciliation).
        data_tests:
          - not_null
      - name: stop_name
        description: "Station name from IDFM source data. Used for display in dashboards."
        data_tests:
          - not_null
      - name: line_code_trns
        description: >
          Transport network operator code (e.g. 100=RATP, 800=SNCF Transilien).
          NOTE: relationship test to dim_line intentionally removed.
          dim_line.line_id uses the IDFM line identifier format (e.g. 'C01836'),
          a completely different concept from the operator code. Cannot be joined
          to dim_line without an intermediate mapping table — tracked as V3
          improvement (operator code to line_id mapping).

          Known operator codes: 100 (RATP), 760-762 (Optile), 800-890 (SNCF Transilien).
          New Optile operators may appear as the network evolves — using
          not_accepted_values on clearly invalid values is more robust than
          maintaining an exhaustive allowlist.
        data_tests:
          - not_null
          - dbt_utils.not_accepted_values:
              values: ['0', '-1', 'NULL', 'UNKNOWN']
              config:
                severity: warn
                # Rationale: operator code space is open-ended (new Optile operators
                # added periodically). Blocking on unknown values generates false
                # positives. Only reject values that are structurally invalid.
                # Run SELECT DISTINCT line_code_trns FROM transport_raw.raw_validations
                # to audit the current full list.
      - name: ticket_type
        description: "Ticket category (normalized UPPER)"
        data_tests:
          - not_null
      - name: validation_count
        description: "Number of validations"
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              inclusive: true
          - assert_positive_values
      - name: ingestion_ts
        description: "Ingestion timestamp (used for freshness monitoring)"
        data_tests:
          - not_null

  - name: fct_punctuality_monthly
    description: |-
      **Monthly punctuality fact table**

      **Grain**: 1 line x 1 month

      **Primary key**: punctuality_key (surrogate)

      **Foreign keys**:
      - line_id -> dim_line (156 Transilien lines unresolved — V3 backlog)

      **Partitioning**: By month_date (MONTH)

      **Clustering**: line_id

      **Materialization**: Incremental (`insert_overwrite`)

      **Refresh**: Monthly (+ 5 days after month end)

      ---

      ⚠️ **Operational risk — insert_overwrite on monthly partitions**

      `insert_overwrite` replaces the entire month partition on each run.
      SNCF occasionally publishes retroactive corrections for past months.
      If a correction arrives in `raw_punctuality` after the initial load,
      the next DAG run will correctly re-ingest it — but only for the current
      month. Past-month corrections must be triggered manually.

      **Procedure for recomputing a past month:**

      Step 1 — ingest the corrected data into raw first (required):
      ```
      make ingest-punctuality START_DATE=YYYY-MM-01 END_DATE=YYYY-MM-31
      ```
      Step 2 — recompute fct_punctuality_monthly from the updated raw:
      ```
      make dbt-refresh-prod MODEL=fct_punctuality_monthly
      ```
      ⚠️ Skipping step 1 and running step 2 alone reads stale raw data —
      the correction will NOT be captured. Both steps are mandatory.

      **Known limitation (partial mitigation only):**
      This procedure requires manual human action — there is no automatic
      detection of retroactive SNCF corrections. A proper fix would switch
      the incremental strategy from `insert_overwrite` to `merge`
      (unique_key=punctuality_key), so corrections are picked up
      automatically on every run. Tracked as a post-V3 backlog item.
    columns:
      - name: punctuality_key
        description: "Unique surrogate key (PK)"
        data_tests:
          - not_null
          - unique:
              config:
                severity: warn
      - name: month_date
        description: "First day of the month (partition key)"
        data_tests:
          - not_null
          - assert_valid_date_range:
              min_date: '2020-01-01'
      - name: line_id
        description: "FK -> dim_line (WARN: 156 Transilien lines unresolved)"
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_line')
              severity: warn
              field: line_id
      - name: punctuality_rate
        description: "Punctuality rate (0-100%)"
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 100
              inclusive: true

  # ─────────────────────────────────────────────────────────────
  # MARTS - BUSINESS
  # ─────────────────────────────────────────────────────────────
  - name: mart_network_scorecard_monthly
    description: |
      **Monthly network scorecard**

      **Grain**: 1 line x 1 month

      **Combines**:
      - Demand metrics (validations)
      - Quality metrics (punctuality)
      - Risk indicators

      **Usage**: Main dashboard / Alerting

      **Refresh**: Daily

      **Key KPIs**:
      - Total validations
      - Avg daily validations
      - MoM growth %
      - Punctuality rate
      - Risk category
    columns:
      - name: month_date
        description: "Reference month"
        data_tests:
          - not_null
          - assert_valid_date_range:
              min_date: '2020-01-01'
      - name: line_id
        description: "Line identifier"
        data_tests:
          - not_null
      - name: total_validations
        description: "Total validations for the month (0 if no validation data for that month)"
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              inclusive: true
      - name: avg_daily_validations
        description: "Average daily validations over the month (NULL if no days with data)"
        data_tests:
          - dbt_utils.accepted_range:
              min_value: 0
              inclusive: true
      - name: punctuality_rate
        description: "Punctuality rate (%)"
        data_tests:
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 100
              inclusive: true
              severity: warn
      - name: risk_category
        description: "Risk category (high/medium/low)"
        data_tests:
          - not_null
          - accepted_values:
              values: ['high_risk', 'medium_risk', 'low_risk']

  # ─────────────────────────────────────────────────────────────
  # MARTS - MONITORING
  # ─────────────────────────────────────────────────────────────
  - name: fct_data_health_daily
    description: |
      **Daily data health monitoring**

      **Grain**: 1 table x 1 date

      **Tracked metrics**:
      - Row count
      - Freshness (hours since last ingestion)
      - SLA compliance

      **SLA per table**:
      - fct_validations_daily: 30h
      - fct_punctuality_monthly: 45 days
      - mart_network_scorecard_monthly: 45 days

      **Usage**: CI/CD data-quality checks + Looker Studio SLA dashboard
    columns:
      - name: table_name
        description: "Name of the monitored table"
        data_tests:
          - not_null
          - accepted_values:
              values: ['fct_validations_daily', 'fct_punctuality_monthly', 'mart_network_scorecard_monthly']
      - name: metric_date
        description: "Monitoring snapshot date"
        data_tests:
          - not_null
      - name: row_count
        description: "Number of rows in the table"
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              inclusive: true
      - name: freshness_hours
        description: "Hours since last ingestion"
        data_tests:
          - not_null
      - name: sla_hours
        description: "Target SLA (hours)"
        data_tests:
          - not_null
      - name: sla_met
        description: "SLA met (boolean) — used by dbt tests and Airflow sensors"
        data_tests:
          - not_null
          - accepted_values:
              values: [true, false]
              quote: false
      - name: sla_numeric
        description: "SLA compliance as integer (1=met, 0=breached) — for Looker visualisation"
        data_tests:
          - not_null
          - accepted_values:
              values: [0, 1]
              quote: false
      - name: freshness_delta
        description: "Hours between current freshness and SLA threshold (negative=under SLA, positive=breach)"
        data_tests:
          - not_null
      - name: sla_status_label
        description: "Business status label based on freshness vs SLA (OK / WARNING / CRITICAL)"
        data_tests:
          - not_null
          - accepted_values:
              values: ['OK', 'WARNING', 'CRITICAL']
      - name: freshness_ratio
        description: "Freshness as ratio of SLA threshold (0.5=safe, 1.0=at limit, >1=breached)"
      - name: sla_status_order
        description: "Numeric sort order for Looker (1=OK, 2=WARNING, 3=CRITICAL)"
        data_tests:
          - not_null
          - accepted_values:
              values: [1, 2, 3]
              quote: false

  - name: mart_validations_station_daily
    description: "Daily validations per station with lat/lon coordinates — used for Looker Studio map. Joins via station_id_zdc=id_ref_zdc. Covers ~100% of validation volume (primary source + complement seed)."
    data_tests:
      - dbt_utils.expression_is_true:
          expression: "latitude IS NOT NULL AND longitude IS NOT NULL"
          config:
            severity: error
    columns:
      - name: validation_date
        description: "Date of validations"
        data_tests:
          - not_null
      - name: station_id_zdc
        description: "Zone de correspondance ID — joins raw_validations.ida with raw_ref_stations.id_ref_zdc"
        data_tests:
          - not_null
      - name: stop_name
        description: "Stop name"
        data_tests:
          - not_null
      - name: latitude
        description: "Stop latitude"
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 48.0
              max_value: 49.5
      - name: longitude
        description: "Stop longitude"
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 1.5
              max_value: 3.5
      - name: daily_validation_count
        description: "Total validations for this stop on this day"
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              inclusive: true

macros:
  - name: usage_profile
    description: >
      V3 3b — Behavioural segmentation macro (Bikeshare pickup_type pattern).
      Classifies each validation into a usage profile based on ticket_type
      and day_of_week. Centralises logic to avoid CASE WHEN duplication in
      downstream marts.

      Segments: commuter_weekday (subscription Mon-Fri) | student (Imagine R)
      | casual_visitor (T+, Navigo Jour, Navigo Easy) | other.

      day_of_week: BigQuery DAYOFWEEK convention (1=Sunday, 2=Monday, 6=Friday).
    arguments:
      - name: ticket_type_column
        type: string
        description: "Column reference for ticket_type (already UPPER/TRIM in staging)"
      - name: day_of_week_column
        type: integer
        description: "Column reference for day_of_week (BigQuery DAYOFWEEK 1-7)"
