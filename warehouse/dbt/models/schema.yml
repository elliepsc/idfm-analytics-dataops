# Tests et documentation des modèles dbt
# V3 — enrichi : ~75 tests (vs 56 en V2)
models:
  # ─────────────────────────────────────────────────────────────
  # STAGING
  # ─────────────────────────────────────────────────────────────
  - name: stg_validations_rail_daily
    description: "Validations réseau ferré - données staging nettoyées et dédupliquées"
    columns:
      - name: validation_date
        description: "Date de validation"
        tests:
          - not_null
          - assert_valid_date_range:
              min_date: '2020-01-01'
      - name: validation_month
        description: "Mois de validation (DATE_TRUNC MONTH)"
        tests:
          - not_null
      - name: year
        description: "Année de validation"
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 2020
              max_value: 2030
              inclusive: true
      - name: month
        description: "Mois (1-12)"
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 1
              max_value: 12
              inclusive: true
      - name: day_of_week
        description: "Jour de la semaine (1=Dimanche, 7=Samedi en BigQuery)"
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 1
              max_value: 7
              inclusive: true
      - name: stop_id
        description: "Identifiant arrêt (code STIF numérique)"
        tests:
          - not_null
      - name: line_code_trns
        description: "Code opérateur transport (100=RATP, 800=SNCF)"
        tests:
          - not_null
      - name: ticket_type
        description: "Catégorie de titre (normalisée UPPER)"
        tests:
          - not_null
      - name: validation_count
        description: "Nombre de validations"
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              inclusive: true
      - name: ingestion_ts
        description: "Timestamp d'ingestion"
        tests:
          - not_null

  - name: stg_punctuality_monthly
    description: "Ponctualité Transilien - données staging nettoyées"
    columns:
      - name: month_date
        description: "Premier jour du mois"
        tests:
          - not_null
          - assert_valid_date_range:
              min_date: '2020-01-01'
      - name: line_id
        description: "Identifiant ligne"
        tests:
          - not_null
      - name: punctuality_rate
        description: "Taux de régularité (%)"
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 100
              inclusive: true

  # ─────────────────────────────────────────────────────────────
  # CORE - DIMENSIONS
  # ─────────────────────────────────────────────────────────────
  - name: dim_stop
    description: |
      **Dimension des arrêts**

      **Grain**: 1 arrêt unique (stop_id)

      **Source**: IDFM référentiel arrêts

      **Refresh**: Quotidien (TRUNCATE + reload)

      **Usage**: Jointure avec fct_validations_daily
    columns:
      - name: stop_id
        description: "Identifiant unique de l'arrêt (PK) — format IDFM:xxxxx"
        tests:
          - not_null
          - unique
      - name: stop_name
        description: "Nom de l'arrêt"
        tests:
          - not_null
      - name: latitude
        description: "Latitude WGS84 (Île-de-France : 48.0–49.5)"
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 48.0
              max_value: 49.5
      - name: longitude
        description: "Longitude WGS84 (Île-de-France : 1.5–3.5)"
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 1.5
              max_value: 3.5

  - name: dim_line
    description: |
      **Dimension des lignes**

      **Grain**: 1 ligne unique (line_id)

      **Source**: IDFM référentiel lignes

      **Refresh**: Quotidien (TRUNCATE + reload)
    columns:
      - name: line_id
        description: "Identifiant unique de la ligne (PK) — format IDFM Cxxxxx"
        tests:
          - not_null
          - unique
      - name: line_name
        description: "Nom de la ligne"
        tests:
          - not_null
      - name: transport_mode
        description: "Mode de transport (RER, METRO, TRAIN, etc.)"
        tests:
          - not_null
          - accepted_values:
              values: ['RER', 'METRO', 'RAIL', 'BUS', 'TRAM', 'CABLEWAY', 'FUNICULAR']
              # values: ['100', '800', '760', '762', '810', '820', '830', '840', '850', '860', '870', '880', '890']
              severity: warn
      - name: operator
        description: "Exploitant (RATP, SNCF, etc.)"
        tests:
          - not_null

  - name: dim_ticket_type
    description: |
      **Dimension des types de titres**

      **Grain**: 1 catégorie de titre unique

      **Source**: Extrait des validations (DISTINCT)
    columns:
      - name: ticket_type_id
        description: "Identifiant surrogate (PK)"
        tests:
          - not_null
          - unique
      - name: ticket_type_name
        description: "Nom de la catégorie"
        tests:
          - not_null

  # ─────────────────────────────────────────────────────────────
  # CORE - FACTS
  # ─────────────────────────────────────────────────────────────
  - name: fct_validations_daily
    description: |
      **Fait des validations quotidiennes**

      **Grain**: 1 arrêt × 1 jour × 1 type de titre × 1 opérateur

      **Clé primaire**: validation_key (surrogate sur stop_id + validation_date + ticket_type + line_code_trns)

      **Identifiants disponibles**:
      - stop_id: code STIF numérique (pas de FK directe vers dim_stop — systèmes différents)
      - line_code_trns: code opérateur (100=RATP, 800=SNCF — pas de FK vers dim_line)
      - ticket_type → dim_ticket_type (jointure possible via ticket_type_name)

      **Partitionnement**: Par validation_date (DAY)

      **Clustering**: stop_id, ticket_type

      **Matérialisation**: Incremental (INSERT_OVERWRITE sur nouvelles dates)

      **Refresh**: Quotidien

      **Rétention**: 2 ans

      **Note V3**: stop_id reconciliation (STIF → IDFM) et line_code_trns → line_id mapping
      sont des améliorations trackées dans le backlog V3.
    columns:
      - name: validation_key
        description: "Clé surrogate unique (PK) — hash(stop_id, validation_date, ticket_type, line_code_trns)"
        tests:
          - not_null
          - unique:
              severity: warn
      - name: validation_date
        description: "Date de validation (partition key)"
        tests:
          - not_null
          - assert_valid_date_range:
              min_date: '2020-01-01'
      - name: validation_month
        description: "Mois de validation (DATE_TRUNC MONTH)"
        tests:
          - not_null
      - name: year
        description: "Année de validation"
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 2020
              max_value: 2030
              inclusive: true
      - name: month
        description: "Mois (1-12)"
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 1
              max_value: 12
              inclusive: true
      - name: day_of_week
        description: "Jour de la semaine (1=Dimanche, 7=Samedi)"
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 1
              max_value: 7
              inclusive: true
      - name: stop_id
        description: >
          Stop identifier using the STIF numeric code (e.g. '1', '10') from
          historical CSV files.
          NOTE: relationship test to dim_stop intentionally removed.
          dim_stop.stop_id uses the IDFM API format (e.g. 'IDFM:11639'), a different
          identifier system for the same physical stops. A direct join requires a
          mapping table — tracked as V3 improvement (stop_id reconciliation).
        tests:
          - not_null
      - name: line_code_trns
        description: >
          Transport network operator code (e.g. 100=RATP, 800=SNCF Transilien).
          NOTE: relationship test to dim_line intentionally removed.
          dim_line.line_id uses the IDFM line identifier format (e.g. 'C01836'),
          a completely different concept from the operator code. Cannot be joined
          to dim_line without an intermediate mapping table — tracked as V3
          improvement (operator code to line_id mapping).
        tests:
          - not_null
          - accepted_values:
              values: ['100', '760', '762', '800', '810', '820', '830', '840', '850', '860', '870', '880', '890']
              severity: warn
      - name: ticket_type
        description: "Catégorie de titre (normalisée UPPER)"
        tests:
          - not_null
      - name: validation_count
        description: "Nombre de validations"
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              inclusive: true
          - assert_positive_values
      - name: ingestion_ts
        description: "Timestamp d'ingestion (pour freshness monitoring)"
        tests:
          - not_null

  - name: fct_punctuality_monthly
    description: |
      **Fait de la ponctualité mensuelle**

      **Grain**: 1 ligne × 1 mois

      **Clé primaire**: punctuality_key (surrogate)

      **Clés étrangères**:
      - line_id → dim_line (156 lignes Transilien manquantes — V3 backlog)

      **Partitionnement**: Par month_date (MONTH)

      **Clustering**: line_id

      **Matérialisation**: Incremental

      **Refresh**: Mensuel (+ 5 jours après fin de mois)
    columns:
      - name: punctuality_key
        description: "Clé surrogate unique (PK)"
        tests:
          - not_null
          - unique:
              config:
                severity: warn
      - name: month_date
        description: "Premier jour du mois (partition key)"
        tests:
          - not_null
          - assert_valid_date_range:
              min_date: '2020-01-01'
      - name: line_id
        description: "FK → dim_line (WARN: 156 lignes Transilien non résolues)"
        tests:
          - not_null
          - relationships:
              to: ref('dim_line')
              severity: warn
              field: line_id
      - name: punctuality_rate
        description: "Taux de régularité (0-100%)"
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 100
              inclusive: true

  # ─────────────────────────────────────────────────────────────
  # MARTS - BUSINESS
  # ─────────────────────────────────────────────────────────────
  - name: mart_network_scorecard_monthly
    description: |
      **Scorecard réseau mensuel**

      **Grain**: 1 ligne × 1 mois

      **Combine**:
      - Demand metrics (validations)
      - Quality metrics (ponctualité)
      - Risk indicators

      **Usage**: Dashboard principal / Alerting

      **Refresh**: Quotidien

      **KPI clés**:
      - Total validations
      - Avg daily validations
      - MoM growth %
      - Punctuality rate
      - Risk category
    columns:
      - name: month_date
        description: "Mois de référence"
        tests:
          - not_null
          - assert_valid_date_range:
              min_date: '2020-01-01'
      - name: line_id
        description: "Identifiant ligne"
        tests:
          - not_null
      - name: total_validations
        description: "Total validations du mois"
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              inclusive: true
      - name: avg_daily_validations
        description: "Moyenne quotidienne de validations sur le mois"
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              inclusive: true
              severity: warn
      - name: punctuality_rate
        description: "Taux de régularité (%)"
        tests:
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 100
              inclusive: true
              severity: warn
      - name: risk_category
        description: "Catégorie de risque (high/medium/low)"
        tests:
          - not_null
          - accepted_values:
              values: ['high_risk', 'medium_risk', 'low_risk']

  # ─────────────────────────────────────────────────────────────
  # MARTS - MONITORING
  # ─────────────────────────────────────────────────────────────
  - name: fct_data_health_daily
    description: |
      **Monitoring quotidien de la santé des données**

      **Grain**: 1 table × 1 date

      **Métriques trackées**:
      - Row count
      - Freshness (hours since last ingestion)
      - Null percentage
      - Duplicate count
      - SLA compliance

      **SLA par table**:
      - fct_validations_daily: 30h
      - fct_punctuality_monthly: 45 jours
      - mart_network_scorecard_monthly: 45 jours

      **Usage**: CI/CD data-quality checks
    columns:
      - name: table_name
        description: "Nom de la table monitorée"
        tests:
          - not_null
          - accepted_values:
              values: ['fct_validations_daily', 'fct_punctuality_monthly', 'mart_network_scorecard_monthly']
      - name: metric_date
        description: "Date du snapshot monitoring"
        tests:
          - not_null
      - name: row_count
        description: "Nombre de lignes dans la table"
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              inclusive: true
      - name: freshness_hours
        description: "Heures depuis dernière ingestion"
        tests:
          - not_null
      - name: sla_hours
        description: "SLA cible (heures)"
        tests:
          - not_null
      - name: sla_met
        description: "SLA respecté (booléen)"
        tests:
          - not_null
          - accepted_values:
              values: [true, false]
              quote: false
