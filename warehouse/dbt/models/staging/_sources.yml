sources:
  - name: raw
    description: "RAW tables from ingestion layer"
    database: "{{ env_var('GCP_PROJECT_ID') }}"
    schema: "{{ env_var('BQ_DATASET_RAW', 'transport_raw') }}"
    tables:
      - name: raw_validations
        description: "Rail network ticket validations (daily)"
        columns:
          - name: date
            description: "Validation date"
            data_tests:
              - not_null
          - name: stop_id
            description: "Stop identifier"
          - name: validation_count
            description: "Number of validations"
            data_tests:
              - not_null
      - name: raw_punctuality
        description: "Transilien punctuality (monthly)"
        columns:
          - name: month
            description: "Month (YYYY-MM format)"
            data_tests:
              - not_null
          - name: line_id
            description: "Line identifier"
          - name: punctuality_rate
            description: "Punctuality rate (%)"
      - name: raw_ref_stops
        description: "Stop referential — denormalized (1 stop × N lines = expected duplicates)"
        columns:
          - name: stop_id
            description: "Stop identifier"
            data_tests:
              - not_null
              # FIX V2: removed 'unique' test — raw_ref_stops is denormalized:
              # one stop appears once per line it serves, so duplicates are expected and normal.
              # Uniqueness is enforced at the dim_stop level via ROW_NUMBER() deduplication.
      - name: raw_ref_lines
        description: "Line referential — full snapshot, replaced on each load (WRITE_TRUNCATE)"
        columns:
          - name: line_id
            description: "Line identifier"
            data_tests:
              - unique
              # OPTION B — dbt uniqueness guard for raw_ref_lines.
              # This test acts as the automated safety net against double-loads:
              # if load_referentials() is accidentally called twice in the same DAG run,
              # or if Airflow retries produce duplicate inserts, this test will catch it.
              #
              # How it works:
              #   - raw_ref_lines uses WRITE_TRUNCATE, so each load should produce
              #     exactly one row per line_id.
              #   - If duplicates exist, COUNT(*) > COUNT(DISTINCT line_id), and this
              #     unique test will return failing rows.
              #   - The test is configured to FAIL (not warn) so that dbt_daily DAG
              #     stops immediately — preventing corrupt data from flowing downstream
              #     into dim_line and mart_network_scorecard_monthly.
              #
              # Paired with Option A in load_bigquery_raw.py which raises a ValueError
              # at load time if table.num_rows != job.output_rows after WRITE_TRUNCATE.
              # Together they provide defense-in-depth:
              #   - Option A catches the problem at ingestion time (fast feedback).
              #   - Option B catches it at transformation time (dbt test gate).
              #
              # FIX V2: removed 'not_null' test — raw_ref_lines contains rows where
              # line_id is NULL (lines with no assignment in the source API).
              # NULL filtering is handled in stg_ref_lines model.
      - name: raw_ref_stop_lines
        description: "Stop to line mapping"

      - name: raw_ref_stop_id_mapping
        description: "TN_PA mapping: STIF numeric stop code ↔ IDFM GTFS stop_id. 528 mappings, ~98.3% validation coverage."
        columns:
          - name: idfm_stop_id
          - name: stif_stop_code
      - name: raw_service_quality
        description: >
          Quarterly service quality indicators from IDFM (qualité du parcours voyageur).
          Covers RATP Métro + RER + SNCF Transilien — 1 row per line × quarter × indicator.
          Full snapshot on each load (WRITE_TRUNCATE).
          Quarter format: "T1 2022" (trimestre + annee combined by extractor).
        columns:
          - name: quarter
            description: "Quarter string e.g. 'T1 2022' (trimestre + annee)"
            data_tests:
              - not_null
          - name: line_id
            description: "IDFM line identifier (may be NULL for bus)"
          - name: indicator_label
            description: "Full indicator name (e.g. 'Information voyageurs statique...')"
            data_tests:
              - not_null
          - name: indicator_value
            description: "Indicator value as text (%, e.g. '96.8')"
          - name: target_value
            description: "Target value as text (%, e.g. '98')"

      - name: raw_incidents_daily
        description: >
          Daily disruption/incident messages from IDFM (Info Trafic).
          Grain: 1 row per incident message. Appended daily (WRITE_APPEND).
          Aggregated at day × incident_type in stg_incidents_daily.
          ⚠️  Table not yet provisioned — source is PRIM API (PRIM_API_KEY required).
          TODO (enable when table exists): restore not_null tests on incident_date + ingestion_ts,
          set stg_incidents_daily enabled=True, fct_incidents_daily enabled=True,
          mart_line_reliability_scorecard enabled=True, mart_station_reliability_scorecard enabled=True.
        columns:
          - name: incident_date
            description: "Incident start date (YYYY-MM-DD)"
            data_tests:
              - not_null:
                  config:
                    severity: warn
          - name: incident_type
            description: "Disruption category (e.g. TRAVAUX, INCIDENT)"
          - name: line_id
            description: "Affected IDFM line_id"
          - name: ingestion_ts
            description: "Ingestion timestamp"
            data_tests:
              - not_null:
                  config:
                    severity: warn

      - name: raw_hourly_profiles
        description: >
          Hourly validation profiles for the rail network (ferré), by stop and day type.
          Source: IDFM quarterly snapshot dataset.
          Grain: 1 stop × 1 hour × 1 day_type.
          Full snapshot on each load (WRITE_TRUNCATE — one edition at a time).
          Day type normalised by extractor: JOHV/JOVS→JOHV, SAHV/SAVS→SAM, DIJFP→DIM.
        columns:
          - name: stop_id
            description: "STIF numeric stop code"
            data_tests:
              - not_null
          - name: hour
            description: "Hour of day (0-23), parsed from 'NNH-NNH' label by extractor. NULL for rows with unexpected trnc_horr_60 format — filtered in staging."
            data_tests:
              - not_null:
                  config:
                    severity: warn
                    # TODO: upgrade to severity: error once all trnc_horr_60 formats are confirmed parseable
                    # 1 NULL row observed on first quarterly load (2026-04-15) — format logged by extractor
          - name: day_type
            description: "Day type: JOHV (weekday), SAM (saturday), DIM (sunday/holiday)"
            data_tests:
              - not_null
          - name: validation_share
            description: "Share of daily validations falling in this hour (0-100%)"
          - name: quarter
            description: "Quarter edition label e.g. 'T2 2025' — set by extractor from config"

      - name: raw_ref_stations
        description: "Station reference data from IDFM — emplacement-des-gares-idf dataset"
        columns:
          - name: id_ref_zdc
            description: "Zone de correspondance ID — matches 'ida' field in raw_validations"
            data_tests:
              - not_null
              - unique:
                  config:
                    severity: warn
                    warn_if: "> 0"
                  # raw_ref_stations has multiple entries per id_ref_zdc (one per platform/access)
                  # deduplication happens in stg_ref_stations via ROW_NUMBER()
          - name: station_name
            description: "Official station name"
          - name: latitude
            description: "Station latitude"
          - name: longitude
            description: "Station longitude"

