version: 2

exposures:
  - name: punctuality_dashboard
    type: dashboard
    maturity: medium
    owner:
      name: Data Team
      email: data@idfm.fr
    description: >
      Dashboard tracking monthly punctuality by line and service.
    config:
      tags: ['dashboard', 'punctuality']
    depends_on:
      - ref('fct_punctuality_monthly')
      - ref('dim_line')
      - ref('mart_network_scorecard_monthly')

  - name: daily_validations_report
    type: dashboard
    maturity: high
    owner:
      name: Data Team
      email: data@idfm.fr
    description: >
      Daily report of ticket validations by stop, line and ticket type.
    config:
      tags: ['dashboard', 'validations']
    depends_on:
      - ref('fct_validations_daily')
      - ref('dim_stop')
      - ref('dim_line')
      - ref('dim_ticket_type')

  - name: data_quality_monitoring
    type: dashboard
    maturity: low
    owner:
      name: Data Team
      email: data@idfm.fr
    description: >
      Pipeline data quality and SLA monitoring.
    config:
      tags: ['monitoring', 'data-quality']
    depends_on:
      - ref('fct_data_health_daily')
      - ref('all_metrics')

  - name: station_map
    type: dashboard
    maturity: medium
    owner:
      name: Data Team
      email: data@idfm.fr
    description: >
      Looker Studio page 5 — geographic map of daily validations by station.
      Displays station_id_zdc with lat/lon coordinates and daily_validation_count.
      Covers ~93% of validation volume via primary source + complement seed.
    config:
      tags: ['dashboard', 'map', 'stations']
    depends_on:
      - ref('mart_validations_station_daily')

  - name: network_scorecard
    type: dashboard
    maturity: medium
    owner:
      name: Data Team
      email: data@idfm.fr
    description: >
      Looker Studio network scorecard — monthly demand and punctuality KPIs by line.
      Tracks MoM validation growth, punctuality rate, quality category and risk classification.
    config:
      tags: ['dashboard', 'scorecard', 'punctuality']
    depends_on:
      - ref('mart_network_scorecard_monthly')
      - ref('dim_line')
