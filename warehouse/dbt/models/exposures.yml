version: 2

exposures:
  - name: tableau_bord_ponctualite
    type: dashboard
    maturity: medium
    owner:
      name: Data Team
      email: data@idfm.fr
    description: >
      Dashboard de suivi de la ponctualite mensuelle par ligne et service.
    depends_on:
      - ref('fct_punctuality_monthly')
      - ref('dim_line')
      - ref('mart_network_scorecard_monthly')
    tags: ['dashboard', 'punctuality']

  - name: rapport_validations_quotidien
    type: dashboard
    maturity: high
    owner:
      name: Data Team
      email: data@idfm.fr
    description: >
      Rapport quotidien des validations par arret, ligne et type de titre.
    depends_on:
      - ref('fct_validations_daily')
      - ref('dim_stop')
      - ref('dim_line')
      - ref('dim_ticket_type')
    tags: ['dashboard', 'validations']

  - name: monitoring_qualite_donnees
    type: ml
    maturity: low
    owner:
      name: Data Team
      email: data@idfm.fr
    description: >
      Monitoring de la qualite des donnees et SLA du pipeline.
    depends_on:
      - ref('fct_data_health_daily')
      - ref('all_metrics')
    tags: ['monitoring', 'data-quality']
