name: 'transport_scorecard'
version: '1.0.0'
config-version: 2

flags:
  require_explicit_package_overrides_for_builtin_materializations: false
  # Suppress MissingArgumentsPropertyInGenericTestDeprecation for custom macros
  # (assert_valid_date_range, assert_positive_values) that use direct kwargs —
  # not the dbt 1.9+ 'arguments:' property pattern. Remove when macros are migrated.
  warn_error_options:
    silence:
      - MissingArgumentsPropertyInGenericTestDeprecation

profile: 'transport'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

packages-install-path: "/tmp/dbt_packages_airflow"

clean-targets:
  - "target"
  # - "dbt_packages_data"
  - "logs"

models:
  transport_scorecard:

    staging:
      +materialized: view
      +schema: staging

    core:
      +materialized: table
      +schema: core
      dimensions:
        +materialized: table
      facts:
        +materialized: incremental
        +on_schema_change: "append_new_columns"
        +incremental_strategy: "insert_overwrite"
        # partition_by intentionally omitted here — each fact model defines its own:
        # fct_validations_daily: field=validation_date, granularity=day
        # fct_punctuality_monthly: field=month_date, granularity=month

    marts:
      +materialized: table
      +schema: analytics
      business:
        +materialized: table
      monitoring:
        +materialized: table

vars:
  # Dev date filters — used in incremental fact models to limit BQ scan in dev
  # (avoids full 4.1M row scan on every dbt build --target dev)
  dev_start_date: '2024-01-01'
  dev_end_date: '2024-12-31'

seeds:
  transport_scorecard:
    +schema: raw
    ticket_type_mapping:
      +column_types:
        ticket_type_code: string
        ticket_type_label: string
        category: string
        is_navigo: boolean
    stop_coordinates_complement:
      +column_types:
        station_id_zdc: integer
        stop_name: string
        latitude: float
        longitude: float
    line_punctuality_target:
      +column_types:
        line_id: string
        line_name: string
        target_punctuality_rate: float
        operator: string
        notes: string
    transport_mode_priority:
      +column_types:
        transport_mode: string
        priority: integer
        color_hex: string

