name: 'transport_scorecard'
version: '1.0.0'
config-version: 2

flags:
  require_explicit_package_overrides_for_builtin_materializations: false

flags:
  require_explicit_package_overrides_for_builtin_materializations: false

profile: 'transport'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

packages-install-path: "/tmp/dbt_packages_airflow"

clean-targets:
  - "target"
  # - "dbt_packages_data"
  - "logs"

models:
  transport_scorecard:

    staging:
      +materialized: view
      +schema: staging

    core:
      +materialized: table
      +schema: core
      dimensions:
        +materialized: table
      facts:
        +materialized: incremental
        +on_schema_change: "append_new_columns"
        +incremental_strategy: "insert_overwrite"
        +partition_by:
          field: "date"
          data_type: "date"
          granularity: "day"

    marts:
      +materialized: table
      +schema: analytics
      business:
        +materialized: table
      monitoring:
        +materialized: table

  elementary:
    +schema: elementary
    +materialized: table

vars:
  dev_start_date: '2024-01-01'
  dev_end_date: '2024-12-31'

seeds:
  transport_scorecard:
    +schema: raw
    ticket_type_mapping:
      +column_types:
        ticket_type_code: string
        ticket_type_label: string
        category: string
        is_navigo: boolean
    stop_coordinates_complement:
      +column_types:
        station_id_zdc: integer
        stop_name: string
        latitude: float
        longitude: float
    stop_coordinates_complement:
      +column_types:
        station_id_zdc: integer
        stop_name: string
        latitude: float
        longitude: float

